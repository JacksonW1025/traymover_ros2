# Nav2 parameters for traymover.
# Adapted from traymover_robot_nav2/param/traymover_params/param_traymover_diff.yaml with:
#   - AMCL section removed (lidar_localization_ros2 provides map -> base_link)
#   - base_footprint -> base_link everywhere (URDF root is base_link)
#   - FAST_LIO /odom is the only navigation odometry source
#   - local costmap runs in odom for smooth control; global costmap stays in map
#   - velocity_smoother removed (reintroduce later if needed)

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    transform_tolerance: 0.2

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    odom_topic: /odom
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.30
      movement_time_allowance: 8.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.25

    FollowPath:
      # Switched from MPPI → RotationShim + RegulatedPurePursuit (RPP).
      # RPP cleanly separates heading alignment from forward motion:
      #   1. If |heading − lookahead bearing| > rotate_to_heading_min_angle
      #      → emit pure rotation (linear = 0) until aligned
      #   2. Otherwise → forward velocity with smooth curvature tracking
      # MPPI's sampling-based nature produced small but persistent zigzag
      # even with wz_std=0.10; RPP is deterministic on a straight path.
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # --- RotationShim parameters (handles initial large heading offset) ---
      # Enter rotate-shim sooner so the robot finishes heading correction
      # before driving forward, instead of trying to "arc in" and wagging
      # left-right on nominally straight goals.
      angular_dist_threshold: 0.90
      # Sample a nearer path point for the rotate-shim decision. With the
      # previous 0.60 m sample the controller often kept driving while still
      # visibly misaligned, then over-corrected back the other way.
      forward_sampling_distance: 0.40
      # Faster in-place rotation so U-turns do not feel sluggish now that the
      # localization stack can hold alignment through larger heading changes.
      rotate_to_heading_angular_vel: 0.45
      max_angular_accel: 0.90
      simulate_ahead_time: 1.0

      # --- RegulatedPurePursuit parameters ---
      # Slightly slower cruise plus a longer lookahead damps the residual
      # corridor wiggle that remained once localization was mostly correct.
      # Raise cruise speed modestly now that path tracking is more stable.
      desired_linear_vel: 0.16
      min_approach_linear_velocity: 0.06
      approach_velocity_scaling_dist: 0.6
      # Lookahead: how far ahead along the path RPP aims. Smaller = tighter
      # tracking (oscillation risk); larger = smoother but cuts corners.
      use_velocity_scaled_lookahead_dist: true
      lookahead_dist: 0.85
      min_lookahead_dist: 0.60
      max_lookahead_dist: 1.45
      lookahead_time: 2.20
      # Turn-in-place when the lookahead point is off-angle. This is the
      # core "separate steering from driving" behaviour the operator asked
      # for — below this angle threshold RPP drives forward with a smooth
      # curvature, above it the robot stops and pivots.
      # (max_angular_accel and rotate_to_heading_angular_vel are shared
      # with the RotationShim above — nav2 reads them once per namespace.)
      use_rotate_to_heading: true
      # Raised from 0.785 (45°) → 1.20 (~69°). At 45° small localization
      # jitter could still flip RPP into "stop and rotate" mode mid-path
      # instead of letting pure pursuit smoothly converge back to the
      # line. The higher threshold reserves pivot-in-place for genuine large
      # mis-alignments only.
      # Pivot earlier; the old ~69 deg threshold let the robot drive while
      # still noticeably skewed, which looked sloppy on simple point-to-point
      # moves and aggravated localization during tight turns.
      rotate_to_heading_min_angle: 0.85
      # Disallow reverse (same rationale as before: no U-turn samples).
      allow_reversing: false
      # Slow down on tight curves and near goal. Cost regulation off —
      # obstacle slow-down is already handled by collision_monitor.
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 1.50
      regulated_linear_scaling_min_speed: 0.06
      use_cost_regulated_linear_velocity_scaling: false
      # Predictive collision on the carrot path — RPP will stop if a
      # candidate forward motion would crash within this horizon.
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      transform_tolerance: 0.2
      # Required by nav2_regulated_pure_pursuit_controller internals:
      max_robot_pose_search_dist: 10.0
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.25

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[[-0.40, -0.275], [-0.40, 0.275], [0.40, 0.275], [0.40, -0.275]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 1.1
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      footprint: "[[-0.40, -0.275], [-0.40, 0.275], [0.40, 0.275], [0.40, -0.275]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 1.1
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35
      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""   # set at launch via RewrittenYaml

planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.50
      use_astar: false
      allow_unknown: true

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    use_sim_time: False
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    # Safety cap: 1/2 of normal. Restore to 1.0 / 0.3 / 1.5 later.
    max_rotational_vel: 0.5
    min_rotational_vel: 0.15
    rotational_acc_lim: 0.75

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 0
