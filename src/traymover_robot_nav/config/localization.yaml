/**:
    ros__parameters:
      registration_method: "NDT_OMP"
      # Tightened for indoor NDT convergence after observing 6DOF divergence
      # (z=2.9m, r/p=17deg). Finer voxels + stricter epsilon + more iters.
      # Slightly relaxed from 0.20. Large heading changes temporarily degrade
      # the match score even when the alignment is still usable; 0.35 still
      # rejects the obviously bad 0.8+ minima we saw, while letting NDT keep
      # up during sharper turns.
      score_threshold: 0.35
      ndt_resolution: 0.5
      ndt_step_size: 0.1
      ndt_num_threads: 4
      ndt_max_iterations: 50
      transform_epsilon: 0.001
      voxel_leaf_size: 0.1
      scan_max_range: 100.0
      scan_min_range: 0.5
      scan_period: 0.1
      use_pcd_map: true
      map_path: "/home/wheeltec/traymover_ros2/src/traymover_robot_slam/FAST_LIO/PCD/traymover_20260418_183556.pcd"
      set_initial_pose: false
      initial_pose_x: 0.0
      initial_pose_y: 0.0
      initial_pose_z: 0.0
      initial_pose_qx: 0.0
      initial_pose_qy: 0.0
      initial_pose_qz: 0.0
      initial_pose_qw: 1.0
      # FAST_LIO runs online as the fast odometry source and publishes
      # /Odometry (remapped to /odom by the launch file). With use_odom:true
      # the node integrates the FAST_LIO twist between NDT updates so NDT's
      # init_guess moves with the robot — the fix for "car pose frozen while
      # robot drives" observed when use_odom was false in open airport space.
      use_odom: true
      # use_imu only affects scan de-skewing inside lidar_localization.
      # FAST_LIO already de-skews the cloud against its own IMU tracking, so
      # re-enabling it here would double-process. Kept false.
      use_imu: false
      enable_debug: false
      # Publish map -> odom (not map -> base_link). FAST_LIO + the static
      # body->base_link chain already publishes odom->base_link at ~20 Hz;
      # NDT now only has to correct the slow FAST_LIO drift vs the prebuilt
      # PCD, so RViz and Nav2 read robot pose via map->odom->base_link.
      enable_map_odom_tf: true
      global_frame_id: map
      odom_frame_id: odom
      base_frame_id: base_link
      enable_timer_publishing: false
      pose_publish_frequency: 20.0
      # Planar lock: ground robot, no pitch/roll in this site. After each
      # NDT match we clip z/roll/pitch back to the values captured from
      # /initialpose. Cuts the effective DOF to x/y/yaw and stops the
      # "tilted robot model + pose jump" failure mode in narrow indoor
      # spaces where z/roll/pitch are geometrically under-constrained.
      # Disabled after observing the first-frame NDT captured z=0.274 on
      # a robot whose URDF says z=0.12. The lock then froze every later
      # NDT attempt at that wrong z, with fitness ballooning to 15–20.
      # Leaving NDT 6DOF-free lets it self-correct; the jump gate below
      # still protects against large drift.
      lock_planar: false
      # Reject an NDT result whose translation or yaw deviates from the
      # motion-predicted init_guess by more than these bounds. Tightened
      # Allow larger yaw corrections than before. During U-turns the old 0.25
      # rad (~14 deg) gate could reject legitimate map corrections and leave
      # FAST_LIO drift uncorrected until the robot was already badly skewed.
      max_pose_jump_translation: 0.35
      max_pose_jump_rotation: 0.45
      # Re-align more often so FAST_LIO drift does not build up through long
      # heading changes before NDT is allowed to correct it.
      ndt_align_interval_s: 1.0
      # Apply corrections a bit faster than before. 0.45 still damps noise,
      # but reduces the "laggy" feel after a successful large-angle realign.
      map_odom_smoothing: 0.45
