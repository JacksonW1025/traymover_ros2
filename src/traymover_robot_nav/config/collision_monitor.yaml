collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_nav"
    cmd_vel_out_topic: "cmd_vel"
    transform_tolerance: 0.3
    source_timeout: 1.0
    stop_pub_timeout: 0.5

    # Polygons in base_link frame. Robot footprint is 0.8 m x 0.55 m
    # (x: -0.40..0.40, y: -0.275..0.275). Stop zone extends 0.5 m forward
    # from the robot's front edge; slowdown zone extends another 0.5 m.
    polygons: ["PolygonStop", "PolygonSlow"]

    PolygonStop:
      type: "polygon"
      # Tight emergency stop zone: 0.40 → 0.72 m in front, slightly wider
      # than the chassis so low obstacles near the corners still stop.
      points: [0.40, 0.32, 0.72, 0.32, 0.72, -0.32, 0.40, -0.32]
      action_type: "stop"
      min_points: 6
      visualize: true
      polygon_pub_topic: "polygon_stop"

    PolygonSlow:
      type: "polygon"
      # Early-warning slowdown: 0.40 → 1.30 m, widened to match the
      # front-only scan slice and provide smoother deceleration.
      points: [0.40, 0.45, 1.30, 0.45, 1.30, -0.45, 0.40, -0.45]
      action_type: "slowdown"
      min_points: 4
      slowdown_ratio: 0.5
      visualize: true
      polygon_pub_topic: "polygon_slowdown"

    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      enabled: true
