turn_on_traymover_robot:
  ros__parameters:
    # 串口配置
    usart_port_name: "/dev/ttyUSB0"
    serial_baud_rate: 115200

    # 坐标系
    robot_frame_id: "base_footprint"
    odom_frame_id: "odom"
    publish_odom_tf: false

    # 里程计来源:
    #   none            -> 不发布 /odom，仅做底盘控制
    #   stm32_feedback  -> 使用 STM32 回包中的编码器增量发布 /odom
    odom_source_mode: "stm32_feedback"

    # 底盘机械参数
    wheel_diameter: 0.20       # 轮径 (m)
    wheel_track: 0.445         # 轮距 (m)
    gear_reduction: 5600       # 编码器 tick/圈
    tick_meter_ratio: 10       # 里程计比例系数
    left_encoder_sign: 1       # 编码器方向 (1 或 -1)
    right_encoder_sign: 1      # 编码器方向 (1 或 -1)
    poll_rate_hz: 20.0         # 查询/控制轮询频率

    # 电机比例
    left_motor_scale: 1
    right_motor_scale: 1

    # 传感器与外设
    alarm_led: 1               # 报警灯 (0=灭, 1=亮)
    ir_threshold: 20           # 红外传感器参考值

    # 超时保护
    cmd_vel_timeout: 0.5       # cmd_vel超时 (秒)，超时后自动发送零速度帧
